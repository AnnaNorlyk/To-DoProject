name: Build and Deploy Frontend to Staging

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build & Push Frontend Image
        run: |
          echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          NS="${{ github.repository_owner }}"; NS="${NS,,}"
          docker build \
            -t ghcr.io/${NS}/todo-frontend:staging \
            -f frontend/Dockerfile \
            frontend
          docker push ghcr.io/${NS}/todo-frontend:staging

      - name: Deliver Docker Compose file to staging
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.STAGING_SERVER_SSH_KEY }}
          source:   "docker-compose.yml"
          target:   "~/todo-app/"

      # Deliver database migrations if/when you add a backend (Relic from old project)
      # - name: Deliver migrations to staging
      #   uses: appleboy/scp-action@v0.1.7
      #   with:
      #     host:     ${{ secrets.SSH_HOST }}
