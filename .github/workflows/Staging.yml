      #     key:      ${{ secrets.STAGING_SERVER_SSH_KEY }}
      #     source:   "database/flyway/sql/*"
      #     target:   "~/todo-app/database/flyway/sql/"

      # Create .env on staging for future DB configuration (Relic from old project)
      # - name: Create .env on staging
      #   uses: appleboy/ssh-action@v0.1.10
      #   with:
      #     host:     ${{ secrets.SSH_HOST }}
      #     username: ${{ secrets.SSH_USER }}
      #     key:      ${{ secrets.STAGING_SERVER_SSH_KEY }}
      #     script: |
      #       cd ~/todo-app
      #       cat <<EOF > .env
      #       MYSQL_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}
      #       MYSQL_DATABASE=${{ secrets.DB_NAME }}
      #       MYSQL_USER=${{ secrets.DB_USER }}
      #       MYSQL_PASSWORD=${{ secrets.DB_USER_PASSWORD }}
      #       EOF

      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.STAGING_SERVER_SSH_KEY }}
          script: |
            cd ~/todo-app
            sed -i 's|ghcr.io/AnnaNorlyk/|ghcr.io/annanorlyk/|g' docker-compose.yml
            docker compose pull
            docker compose up -d
