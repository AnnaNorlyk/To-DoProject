name: Build and Deploy to Staging

on:
  push:
    branches: 
    - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Debug workspace layout
        run: |
          echo "PWD = $(pwd)"
          echo
          echo "— top-level files —"
          ls -1
          echo
          echo "— show db folder if present —"
          ls -R db || echo "(no db folder)"
          echo
          echo "— show migrations folder if present —"
          ls -R db/migration || echo "(no db/migration)"
          ls -R db/migrations || echo "(no db/migrations)"

      - name: Login to GHCR
        run: |
          echo "${{ secrets.CR_PAT }}" \
            | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build & push Docker images
        run: |
          NS="${{ github.repository_owner }}"
          NS="${NS,,}"
          docker build -t ghcr.io/${NS}/todo-backend:staging -f API/Dockerfile .
          docker push  ghcr.io/${NS}/todo-backend:staging
          docker build -t ghcr.io/${NS}/todo-frontend:staging -f frontend/Dockerfile frontend
          docker push  ghcr.io/${NS}/todo-frontend:staging

      - name: Copy compose & migrations
        uses: appleboy/scp-action@v0.1.7
        with:
          host:      ${{ vars.STAGING_SERVER_IP }}
          username:  ${{ vars.STAGING_SERVER_USERNAME }}
          key:       ${{ secrets.STAGING_SERVER_SSH_KEY }}
          source: |
            docker-compose.yml
            db/migration/*.sql
          target:   todo-app/
          overwrite: true

      - name: Create .env on server
        uses: appleboy/ssh-action@v1.2.1
        with:
          host:     ${{ vars.STAGING_SERVER_IP }}
          username: ${{ vars.STAGING_SERVER_USERNAME }}
          key:      ${{ secrets.STAGING_SERVER_SSH_KEY }}
          script: |
            cd ~/todo-app
            cat > .env <<EOF
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
            MYSQL_USER=${{ secrets.MYSQL_USER }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            EOF

      - name: Deploy stack
        uses: appleboy/ssh-action@v0.1.10
        with:
          host:            ${{ vars.STAGING_SERVER_IP }}
          username:        ${{ vars.STAGING_SERVER_USERNAME }}
          key:             ${{ secrets.STAGING_SERVER_SSH_KEY }}
          command_timeout: 1200
          script: |
            cd ~/todo-app
            docker compose pull
            docker compose up -d
